<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Time Table.</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="main-container" id="container">
        <div class="main">
        <h1 class="heading" id="head">multiplication time-table.</h1>
        <p class="greeting" id="greeting"></p>
        <div class="sub-container" id="subc">
            <div>
                <input type="text" id="number" class="number" placeholder="Enter Number">
            </div>
            <div>
                <input type="text" id="range" class="range" placeholder="Enter Length">
            </div>
            <div class="control">
                <button class="btn" id="btn">submit</button>
                <button class="cancel" id="cancel">cancel</button>
            </div>
        </div>
        </div>
    </div>
    
    <ul class="result hidden" id="result">

    </ul>
    <script src="https://unpkg.com/typed.js@3.0.0/dist/typed.umd.js"></script>
    <script src="main.js"></script>
</body>
</html>
